<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP for the popup page. Matches the stricter manifest-level CSP.
      No 'unsafe-inline' needed — all styles are in popup.css or set via CSSOM.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none';"
    />
    <title>Dynamics Audit Lens</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="accent-bar"></div>

    <div id="app">
      <header class="header">
        <img src="../../icons/icon48.png" alt="" class="header__logo" />
        <div class="header__text">
          <h1 class="header__title">Dynamics Audit Lens</h1>
        </div>
      </header>

      <main id="main-content" class="main">
        <p id="status-msg" class="status status--idle">Waiting for Dynamics page…</p>

        <div id="record-info" class="record-info" hidden>
          <span id="record-count" class="record-info__count">0 records selected</span>
          <span id="entity-name" class="record-info__entity"></span>
        </div>

        <button id="export-btn" class="btn btn--primary" disabled>
          <svg class="btn__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="15" height="15" aria-hidden="true">
            <path d="M10.75 2.75a.75.75 0 0 0-1.5 0v8.614L6.295 8.235a.75.75 0 1 0-1.09 1.03l4.25 4.5a.75.75 0 0 0 1.09 0l4.25-4.5a.75.75 0 0 0-1.09-1.03l-2.955 3.129V2.75Z"/>
            <path d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z"/>
          </svg>
          Export to Excel
        </button>

        <div id="progress-section" class="progress-section" hidden>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-bar__fill"></div>
          </div>
          <p id="progress-text" class="progress-text">Preparing…</p>
        </div>
      </main>

      <footer class="footer">
        <span class="footer__note">All data stays in your browser.</span>
      </footer>
    </div>

    <!-- Module script — processed by Vite / @crxjs -->
    <script type="module" src="popup.js"></script>
  </body>
</html>
